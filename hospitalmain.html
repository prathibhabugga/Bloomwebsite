<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bloom - Hospital Verification</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins', sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg,#ffe6f2,#f3e8ff,#ffd6ec);
  overflow:auto;
  padding:20px;
  position:relative;
}

/* Floating glows */
.glow{
  position:absolute;
  border-radius:50%;
  filter:blur(140px);
  z-index:-1;
  animation:float 6s ease-in-out infinite alternate;
}

.glow1{
  width:350px;
  height:350px;
  background:#e6ccff;
  top:-100px;
  right:-100px;
}

.glow2{
  width:300px;
  height:300px;
  background:#ffd6ec;
  bottom:-80px;
  left:-80px;
}

@keyframes float{
  0%{transform:translateY(0px) translateX(0px);}
  50%{transform:translateY(15px) translateX(10px);}
  100%{transform:translateY(0px) translateX(0);}
}

/* Container */
.container{
  background: rgba(255,255,255,0.35);
  backdrop-filter: blur(25px);
  border-radius:30px;
  padding:30px 25px;
  box-shadow: 0 20px 60px rgba(122,78,159,0.25);
  max-width:450px;
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  animation:fadeSlide 1s ease forwards;
  overflow:auto;
  max-height:90vh;
}

/* Quote */
.quote{
  font-family:'Playfair Display', serif;
  font-size:26px;
  font-weight:700;
  color:#7a4e9f;
  text-align:center;
  margin-bottom:25px;
}

.quote span.heart{
  color:#a855f7;
  margin-left:6px;
}

/* Form Group */
.form-group{
  width:100%;
  margin-bottom:15px;
  display:flex;
  flex-direction:column;
}

.form-group label{
  font-size:13px;
  color:#7a4e9f;
  margin-bottom:5px;
  font-weight:500;
}

.form-group input, 
.form-group select{
  padding:12px 16px;
  border-radius:15px;
  border:1px solid #d8b7ff;
  outline:none;
  font-size:14px;
  background:rgba(255,255,255,0.65);
  transition:0.3s;
}

.form-group input:focus, .form-group select:focus{
  border:2px solid #a855f7;
  box-shadow:0 6px 15px rgba(122,78,159,0.3);
  background: rgba(255,255,255,0.8);
}

/* File Upload */
.file-upload{
  display:flex;
  align-items:center;
  justify-content:flex-start;
}

.file-upload input[type="file"]{
  display:none;
}

.file-upload label{
  padding:10px 18px;
  border-radius:15px;
  background: linear-gradient(135deg,#a855f7,#7a4e9f);
  color:white;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
  margin-bottom:10px;
  text-align:center;
}

.file-upload label:hover{
  transform:scale(1.05);
  box-shadow:0 6px 20px rgba(122,78,159,0.3);
}

/* Submit Button */
.submit-btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:20px;
  background: linear-gradient(135deg,#a855f7,#7a4e9f);
  color:white;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
  transition:0.4s;
  margin-top:10px;
}

.submit-btn:hover{
  transform:scale(1.05);
  box-shadow:0 10px 30px rgba(122,78,159,0.4);
}

/* Bottom Quote */
.bottom-quote{
  text-align:center;
  font-size:13px;
  color:#7a4e9f;
  margin-top:15px;
}

.bottom-quote span.heart{
  color:#a855f7;
  margin-left:5px;
}

/* Animations */
@keyframes fadeSlide{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

/* Scrollbar small */
.container::-webkit-scrollbar{
  width:6px;
}

.container::-webkit-scrollbar-thumb{
  background:#a855f7;
  border-radius:10px;
}
</style>
</head>
<body>

<div class="glow glow1"></div>
<div class="glow glow2"></div>

<div class="container">
  <div class="quote">
    "Almost there! Complete your hospital details 💜"
  </div>

  <form id="hospitalProfileForm">
    <div class="form-group">
      <label>Hospital Registration / License ID</label>
      <input type="text" placeholder="Enter your registration/license ID" required>
    </div>

    <div class="form-group">
      <label>Hospital Type</label>
      <select id="hospitalType" required>
        <option value="" disabled selected>Select Hospital Type</option>
        <option>Maternity Hospital</option>
        <option>General Hospital</option>
        <option>Clinic</option>
        <option>Others</option>
      </select>
    </div>

    <div class="form-group">
      <label>Hospital Capacity / Beds</label>
      <input type="number" placeholder="Enter total number of beds" min="0" required>
    </div>

    <div class="form-group file-upload">
      <label for="license">Upload Hospital License</label>
      <input type="file" id="license" required>
    </div>

    <div class="form-group file-upload">
      <label for="idProof">Upload Hospital ID Proof</label>
      <input type="file" id="idProof" required>
    </div>

    <button type="submit" class="submit-btn">Submit for Verification</button>
  </form>

  <div class="bottom-quote">
    Your hospital profile is under verification by Bloom Team <span class="heart">💜</span><br>
    You will be notified once approved.
  </div>
</div>

<script>
// Hospital Type "Others" toggle (if needed for extra input)
const hospitalTypeSelect = document.getElementById('hospitalType');
hospitalTypeSelect.addEventListener('change', function(){
  // optional: you can show an extra input if 'Others' selected
});
 window.location.href="hospital-home.html";
</script>

</body>
</html>
